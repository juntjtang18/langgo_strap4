name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: langgo_ci_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d langgo_ci_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      CI: true
      NODE_ENV: test
      HOST: 127.0.0.1
      PORT: 1337
      IS_LOCAL: true
      CRON_ENABLED: false
      DISABLE_BACKGROUND_TASKS: true
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_NAME: langgo_ci_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SCHEMA: public
      APP_KEYS: testKeyA,testKeyB,testKeyC,testKeyD
      API_TOKEN_SALT: testApiTokenSalt
      ADMIN_JWT_SECRET: testAdminJwtSecret
      JWT_SECRET: testJwtSecret
      TRANSFER_TOKEN_SALT: testTransferTokenSalt
      OPENAI_API_KEY: test-openai-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm run test:ci
